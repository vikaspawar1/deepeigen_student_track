services:
  - type: static
    name: deepeigen-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        value: https://your-backend-name.onrender.com
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
